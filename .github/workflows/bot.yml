name: market-expert-bot

# Manual fallback only. GitHub throttles free-tier schedules to fire every
# 2-3 hours, so the */15 cron was removed — live alerting runs via
# run_forever.py on an always-on host instead (see README).
on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - uses: actions/cache@v4
        with:
          path: |
            .cache
            state
          key: bot-cache
      - run: pip install -r requirements.txt
      - run: python main_alerts.py
        env:
          CAPITAL_API_KEY:    ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_EMAIL:      ${{ secrets.CAPITAL_EMAIL }}
          CAPITAL_PASSWORD:   ${{ secrets.CAPITAL_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
