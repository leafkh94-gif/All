name: market-expert-bot

# GitHub-native always-on mode ("relay" pattern):
#   - each run keeps run_forever.py alive for ~5h40m (under GitHub's 6h job cap),
#     scanning every 15 min and answering Telegram commands in real time
#   - just before exiting it dispatches the next run using the job's own
#     built-in GITHUB_TOKEN (granted actions:write below) - no manual secret
#     required. If this repo's default Actions token permissions are
#     read-only, GitHub silently caps the token and the dispatch call fails;
#     an optional WORKFLOW_PAT secret is used instead if one is ever added,
#     but nothing needs to be created for the bot to work.
#   - the hourly cron is only a safety net that restarts the chain if it breaks
#     (GitHub throttles cron heavily, so it must never be the primary trigger)
# Start the chain once by hand: Actions -> market-expert-bot -> Run workflow.
on:
  workflow_dispatch:
  schedule:
    - cron: "23 * * * *"

permissions:
  contents: read
  actions: write

# Never let two relay jobs run at once (duplicate alerts / state races).
# A queued run simply waits for the active one to finish.
concurrency:
  group: market-expert-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      # Cache keys are immutable on GitHub, so save under a fresh key each run
      # and restore the newest previous one via the prefix.
      - uses: actions/cache@v4
        with:
          path: |
            .cache
            state
          key: bot-state-${{ github.run_id }}
          restore-keys: |
            bot-state-
            bot-cache
      - run: pip install -r requirements.txt
      - name: Run bot (real-time relay, ~5h40m)
        run: python run_forever.py
        env:
          MAX_RUNTIME_MINUTES: "340"
          CAPITAL_API_KEY:    ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_EMAIL:      ${{ secrets.CAPITAL_EMAIL }}
          CAPITAL_PASSWORD:   ${{ secrets.CAPITAL_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          # No secret needed: strategy/news_calendar.py reads a public RSS feed.
          # Override only if the default (Khaleej Times) needs to change.
          # NEWS_RSS_URL: "https://example.com/rss"
          # No secret needed: strategy/economic_calendar.py reads a public,
          # no-signup Forex Factory calendar feed. Override only if the
          # default feed URL or assumed timezone needs to change.
          # ECONOMIC_CALENDAR_URL: "https://example.com/calendar.xml"
          # ECONOMIC_CALENDAR_TZ: "America/New_York"
          # BTCUSD-only whale-flow confirmation bonus (strategy/whale_tracker.py).
          # Sign up for a free-tier key at https://whale-alert.io/ and add it as
          # a repo secret; until then this is unset and the feature is a no-op.
          WHALE_ALERT_API_KEY: ${{ secrets.WHALE_ALERT_API_KEY }}
      - name: Chain the next relay run
        if: always()
        env:
          DISPATCH_TOKEN: ${{ secrets.WORKFLOW_PAT || secrets.GITHUB_TOKEN }}
        run: |
          code=$(curl -s -o /tmp/dispatch.out -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/bot.yml/dispatches" \
            -d '{"ref":"main"}')
          echo "dispatch HTTP status: $code"
          cat /tmp/dispatch.out
          if [ "$code" -ge 300 ]; then
            echo "::warning::Self-dispatch failed (HTTP $code). The hourly cron will restart the bot within ~1h instead of immediately. See README for the one-time fix (Settings > Actions > General > Workflow permissions > Read and write)."
          fi
